{t:"The 10X Rule",s:"Set targets 10x bigger. Take 10x more action. Mathematical formula not motivation. Most people are under-targeted not under-capable. Fear at new levels is normal and required.",tag:"Philosophy"},
{t:"Business Breakthrough Model",s:"Revenue first then Profit then Freedom. Always in that order. Most owners chase freedom before fixing revenue. CV builds every engagement around this sequence.",tag:"Framework"},
{t:"The 5 Pillars and DBM",s:"Sales, Marketing, Operations, Finance, Leadership. DBM (Discovery Breakthrough Method) diagnoses the bottleneck pillar. Ask: if sales doubled next month what would break first?",tag:"Framework"},
{t:"CV Products and Pricing",s:"Elite Edge: $497 entry (back of room), $1997 regular (front/lunch/Q&A), $4997 Super VIP (reserved front row, guest). Essential Workshops: $5000 each 2-day pillar-specific. 3-for-1 bundle available. BMLP, 10X360 (flagship retained upsell), BAW, Home Study Course 12hrs, Vertical Summit for $1M+ home services.",tag:"Business"},
{t:"CSR Official Script 2026",s:"Intro: confirm owner, what business, last year revenue, 5-year target, biggest challenge. Drill: why/example/tried/how long/cost/what if nothing changes. RECO path: tailor pitch to pain, trial close (would investing a few thousand and a few days be one of the best investments ever?), text ticket options, email invoice via HubSpot, onboard at EliteEdgeOnboarding.com. NOT RECO: gatekeeper script, find owner, call back.",tag:"Sales"},
{t:"Mastering Objections 6 Steps",s:"1. LISTEN do not interrupt. 2. ACKNOWLEDGE I agree with you. 3. ISOLATE any other concerns? 4. VALIDATE that wouldn't keep you from buying would it? 5. DETERMINE TYPE price/product/terms/stall/complaint. 6. CLOSE OR HANDLE. Golden Rule: treat all objections as complaints until isolated and validated.",tag:"Sales"},
{t:"4 Secrets About Objections",s:"1. You create every objection, take full responsibility. 2. Most dangerous = the UNSPOKEN objection. 3. Most objections are complaints, use them to close. 4. Objections are never a reason to stop the deal, they are a reason to close it.",tag:"Sales"},
{t:"Think About It Handles",s:"What exactly do you want to think through? | Is it decision money or trust? | Thinking is not a strategy. Decisions do. | Clarity comes after action not after thinking. | What would make this an easy yes today? | Thinking is revving in neutral, makes noise but doesn't move you forward. | Give yourself the advice you would give someone you love.",tag:"Sales"},
{t:"Spouse and Partner Objection",s:"Frame: Bring them a solution not uncertainty. Flip-flop: If your spouse found a trusted solution you would support them right? Coach: Lead with I found someone I trust to solve this, I would love your support. Present as solution not question. Never let them leave without booking a follow-up with both present.",tag:"Sales"},
{t:"DBM Sales Pillar Questions",s:"Where is the bottleneck, more leads, higher close rate, or higher ticket? | What breaks first if I gave you 50 leads next week? | Walk me through your last 10 opportunities, where did you lose momentum? | What are your lead-to-appt and appt-to-close rates? | If we recorded 10 calls what would we hear, weak discovery, weak certainty, or weak offer?",tag:"Framework"},
{t:"DBM All Other Pillars",s:"Marketing: More awareness more leads or better quality leads? | Who is your ideal customer in one sentence? Ops: If sales doubled what breaks first, people process systems or cash? | Do you run on a scoreboard or feelings and meetings? Hiring: Which role is the biggest constraint? | What does A-player mean in measurable terms? People: Skill problem will problem or leadership problem? Process: Speed consistency quality or profitability?",tag:"Framework"},
{t:"Leadership Essentials Workshop Script",s:"Open: What is your biggest leadership opportunity right now? Thank and drill. Pitch 2-day: Assess Personal Opportunity Profile, Establish Development Strategy, Sharpen Communication Skills, Write Custom Leadership Scripts, Develop Coaching Process, Create 90-Day Action Plan. Close: Have you heard enough to make a decision? Yes: Great what card? No: What are you uncertain about?",tag:"Sales"},
{t:"Operations Essentials Workshop Script",s:"Open: What is your biggest Operations opportunity right now? Thank and drill. Pitch 2-day: Strategically Duplicate, Improve Efficiency, Inspire Your Team, Track KPIs and Metrics, Making Process and Time Work for You, Coaching Process, Team Meeting Structure. Close: If you could solve [PAIN] would you agree this $5000 was the best investment? | How many team members would you like to send?",tag:"Sales"},
{t:"People Essentials Workshop Script",s:"Open: What is your biggest opportunity as it relates to your people? Thank and drill. Pitch 2-day: attract align develop retain employees. Walk away with: Mission Vision Core Values, defined team process, Talent Alignment and Retention, HR Toolbox, 4-Week Onboarding Plan, CV Interviewing Process. Close: Have you heard enough to make a decision?",tag:"Sales"},
{t:"Finance Essentials Workshop Script",s:"Open: What is your biggest financial opportunity right now? Thank and drill. Pitch 2-day: budgeting, compensation plans, equity earning structures, business exit setup, interpret financial statements, set up KPIs, bring on partners and investors, maximize business value. Close: Have you heard enough to make a decision?",tag:"Sales"},
{t:"Post Event Setter Script 360 Upsell",s:"Opener: Brandon wanted me to reach out to make sure you walked away with 2-3 things to implement. Get current rev and employees. Drill: Clarify, Label, Overview, Urgency (what if next year is same or worse?), Desire (what does achieving this mean personally?), Doubt (what's been keeping you from solving this?). Then: Why didn't you move forward with 10X360? Isolate. Close: I'm 10/10 confident we can help, when can you meet with them, right now later today or tomorrow?",tag:"Sales"},
{t:"BMLP and CV Leadership",s:"Business Mastery Leadership Program, CV flagship certification. Awarded by Brandon Dawson Co-Founder CEO and Natalie Dawson Co-Founder President. Represents exceptional leadership, continual growth, and relentless pursuit of excellence.",tag:"Culture"},
{t:"Brandon Evolution and Career Path",s:"CSR metrics: Start 12-15 tickets per week, grow to 15-20, path to Team Lead then Director of Sales at 10X Home Services. D1 metric is the primary daily performance indicator. 10X360 is the flagship retained program, upsell target after every Elite Edge and Essential Workshop close.",tag:"Career"},
{t:"Handling Buyer Fears",s:"Buyers fear wasting time, making mistakes, being taken advantage of, looking bad. The cure for ALL buyer fear is COMMUNICATION. Questions: Why haven't you done this already? | What is your real concern? | If I resolve everything are you in a position to make a decision? | What do you need to see to justify this investment?",tag:"Sales"},
{t:"Rules of Negotiation",s:"Never give one objection too much power. Never talk while buyer objects. Never take it personally. Never handle more than one at a time. Never make verbal solutions or offers. Never abandon negotiations. Never quit communicating. Never believe an objection will keep the buyer from buying.",tag:"Sales"},
{t:"Industry Analogies",s:"HVAC: You don't sit in a hot house to think about AC. Plumbing: A drip is not a debate it is a decision. Construction: Nothing gets built without a start date. Landscaping: Weeds grow while you wait. Fleet: Fleet owners don't guess they schedule maintenance. General: Thinking is revving in neutral.",tag:"Sales"},
{t:"10X One-Liners",s:"Thinking is not a strategy. | Clarity creates speed. | Comfort is expensive. | Indecision is a decision. | Master the objection and master the close. | Objections are never a reason to stop the deal. | Coachability is the multiplier. | Speed of implementation separates 10X from 1X. | Revenue solves most problems. | Be obsessed or be average.",tag:"Philosophy"},
